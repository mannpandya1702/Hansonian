# ── Hansonian OS — Google Cloud Build ───────────────────────────────────────
# Triggered on: PR (validate only) or merge to main (build + push to GAR)
#
# Required substitutions (set in Cloud Build trigger config):
#   _REGION      : australia-southeast1
#   _PROJECT     : your-gcp-project-id
#   _REGISTRY    : australia-southeast1-docker.pkg.dev/your-gcp-project-id/hansonian
#   _SHORT_SHA   : $SHORT_SHA (auto-populated by Cloud Build)

substitutions:
  _REGION: australia-southeast1
  _REGISTRY: australia-southeast1-docker.pkg.dev/${PROJECT_ID}/hansonian

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET

steps:
  # ── Step 1: Install shared deps (root) ─────────────────────────────────────
  - id: install-shared
    name: node:20-alpine
    entrypoint: sh
    args:
      - -c
      - |
        cd shared && npm ci || true

  # ── Step 2: Lint + build each Next.js app (parallel fan-out) ───────────────
  - id: build-gateway
    name: node:20-alpine
    waitFor: [install-shared]
    entrypoint: sh
    args:
      - -c
      - |
        cd gateway
        npm ci
        npm run lint
        npm run build
    env:
      - NEXT_PUBLIC_FIREBASE_API_KEY=${_FIREBASE_API_KEY}
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}

  - id: build-admin-web
    name: node:20-alpine
    waitFor: [install-shared]
    entrypoint: sh
    args:
      - -c
      - |
        cd admin-web
        npm ci
        npm run lint
        npm run build
    env:
      - NEXT_PUBLIC_FIREBASE_API_KEY=${_FIREBASE_API_KEY}
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}

  - id: build-employee-ops
    name: node:20-alpine
    waitFor: [install-shared]
    entrypoint: sh
    args:
      - -c
      - |
        cd employee-ops
        npm ci
        npm run lint
        npm run build
    env:
      - NEXT_PUBLIC_FIREBASE_API_KEY=${_FIREBASE_API_KEY}
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}

  - id: build-family-portal
    name: node:20-alpine
    waitFor: [install-shared]
    entrypoint: sh
    args:
      - -c
      - |
        cd family-portal
        npm ci
        npm run lint
        npm run build
    env:
      - NEXT_PUBLIC_FIREBASE_API_KEY=${_FIREBASE_API_KEY}
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}

  - id: build-apps-web
    name: node:20-alpine
    waitFor: [install-shared]
    entrypoint: sh
    args:
      - -c
      - |
        cd apps/web
        npm ci
        npm run lint
        npm run build
    env:
      - NEXT_PUBLIC_FIREBASE_API_KEY=${_FIREBASE_API_KEY}
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}

  # ── Step 3: Docker build + push each app (only on main branch) ─────────────
  - id: docker-gateway
    name: gcr.io/cloud-builders/docker
    waitFor: [build-gateway]
    entrypoint: sh
    args:
      - -c
      - |
        docker build \
          --tag ${_REGISTRY}/gateway:${SHORT_SHA} \
          --tag ${_REGISTRY}/gateway:latest \
          --cache-from ${_REGISTRY}/gateway:latest \
          --file gateway/Dockerfile \
          .
        docker push ${_REGISTRY}/gateway:${SHORT_SHA}
        docker push ${_REGISTRY}/gateway:latest

  - id: docker-admin-web
    name: gcr.io/cloud-builders/docker
    waitFor: [build-admin-web]
    entrypoint: sh
    args:
      - -c
      - |
        docker build \
          --tag ${_REGISTRY}/admin-web:${SHORT_SHA} \
          --tag ${_REGISTRY}/admin-web:latest \
          --cache-from ${_REGISTRY}/admin-web:latest \
          --file admin-web/Dockerfile \
          .
        docker push ${_REGISTRY}/admin-web:${SHORT_SHA}
        docker push ${_REGISTRY}/admin-web:latest

  - id: docker-employee-ops
    name: gcr.io/cloud-builders/docker
    waitFor: [build-employee-ops]
    entrypoint: sh
    args:
      - -c
      - |
        docker build \
          --tag ${_REGISTRY}/employee-ops:${SHORT_SHA} \
          --tag ${_REGISTRY}/employee-ops:latest \
          --cache-from ${_REGISTRY}/employee-ops:latest \
          --file employee-ops/Dockerfile \
          .
        docker push ${_REGISTRY}/employee-ops:${SHORT_SHA}
        docker push ${_REGISTRY}/employee-ops:latest

  - id: docker-family-portal
    name: gcr.io/cloud-builders/docker
    waitFor: [build-family-portal]
    entrypoint: sh
    args:
      - -c
      - |
        docker build \
          --tag ${_REGISTRY}/family-portal:${SHORT_SHA} \
          --tag ${_REGISTRY}/family-portal:latest \
          --cache-from ${_REGISTRY}/family-portal:latest \
          --file family-portal/Dockerfile \
          .
        docker push ${_REGISTRY}/family-portal:${SHORT_SHA}
        docker push ${_REGISTRY}/family-portal:latest

  - id: docker-apps-web
    name: gcr.io/cloud-builders/docker
    waitFor: [build-apps-web]
    entrypoint: sh
    args:
      - -c
      - |
        docker build \
          --tag ${_REGISTRY}/apps-web:${SHORT_SHA} \
          --tag ${_REGISTRY}/apps-web:latest \
          --cache-from ${_REGISTRY}/apps-web:latest \
          --file apps/web/Dockerfile \
          .
        docker push ${_REGISTRY}/apps-web:${SHORT_SHA}
        docker push ${_REGISTRY}/apps-web:latest

# Images produced by this build (for Cloud Build history UI)
images:
  - ${_REGISTRY}/gateway:${SHORT_SHA}
  - ${_REGISTRY}/admin-web:${SHORT_SHA}
  - ${_REGISTRY}/employee-ops:${SHORT_SHA}
  - ${_REGISTRY}/family-portal:${SHORT_SHA}
  - ${_REGISTRY}/apps-web:${SHORT_SHA}

timeout: 1800s  # 30 minutes
