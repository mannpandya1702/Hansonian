name: Build & Push to Artifact Registry

on:
  push:
    branches: [main]

env:
  GCP_REGION: australia-southeast1
  GAR_HOST: australia-southeast1-docker.pkg.dev
  GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
  REGISTRY: australia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hansonian

jobs:
  # ── Build and push each Next.js app ─────────────────────────
  build-and-push:
    name: Build & Push — ${{ matrix.app }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for Workload Identity Federation

    strategy:
      fail-fast: false
      matrix:
        include:
          - app: gateway
            dockerfile: gateway/Dockerfile
          - app: admin-web
            dockerfile: admin-web/Dockerfile
          - app: employee-ops
            dockerfile: employee-ops/Dockerfile
          - app: family-portal
            dockerfile: family-portal/Dockerfile
          - app: apps-web
            dockerfile: apps/web/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_HOST }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.app }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}

      - name: Output image digest
        run: echo "Pushed ${{ matrix.app }} → ${{ steps.meta.outputs.tags }}"

  # ── Flutter: build Android APK and upload as artifact ────────
  build-flutter:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: stable
          cache: true

      - name: Setup Java (for Android build)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Get dependencies
        working-directory: caregiver-mobile
        run: flutter pub get

      - name: Build APK
        working-directory: caregiver-mobile
        run: flutter build apk --release --no-pub

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: caregiver-mobile-apk-${{ github.sha }}
          path: caregiver-mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ── Notify on completion ────────────────────────────────────
  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [build-and-push, build-flutter]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| App | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Next.js apps | ${{ needs.build-and-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Flutter APK  | ${{ needs.build-flutter.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit       | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
