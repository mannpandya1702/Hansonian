name: PR Validation

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ── Lint + type-check every Next.js app ─────────────────────
  validate-apps:
    name: Lint & Type Check — ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: gateway
            dir: gateway
          - app: apps-web
            dir: apps/web
          - app: admin-web
            dir: admin-web
          - app: employee-ops
            dir: employee-ops
          - app: family-portal
            dir: family-portal

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.dir }}
        run: npm ci

      - name: Lint
        working-directory: ${{ matrix.dir }}
        run: npm run lint

      - name: Type check
        working-directory: ${{ matrix.dir }}
        run: npm run type-check
        continue-on-error: true  # remove once all apps have type-check script

      - name: Build
        working-directory: ${{ matrix.dir }}
        run: npm run build
        env:
          # Provide dummy env vars so build doesn't fail on missing secrets
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY || 'ci-placeholder' }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN || 'ci-placeholder' }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID || 'ci-placeholder' }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET || 'ci-placeholder' }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID || 'ci-placeholder' }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID || 'ci-placeholder' }}

  # ── Flutter mobile validation ────────────────────────────────
  validate-flutter:
    name: Lint & Analyze — caregiver-mobile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: caregiver-mobile
        run: flutter pub get

      - name: Analyze
        working-directory: caregiver-mobile
        run: flutter analyze

      - name: Run tests
        working-directory: caregiver-mobile
        run: flutter test --no-pub
        continue-on-error: true  # no tests yet

  # ── Docker build validation (dry-run, no push) ───────────────
  validate-docker:
    name: Docker Build (dry-run) — ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: gateway
            dockerfile: gateway/Dockerfile
          - app: admin-web
            dockerfile: admin-web/Dockerfile
          - app: employee-ops
            dockerfile: employee-ops/Dockerfile
          - app: family-portal
            dockerfile: family-portal/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: hansonian/${{ matrix.app }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Required status check gate ───────────────────────────────
  all-checks-pass:
    name: All Checks Pass
    runs-on: ubuntu-latest
    needs: [validate-apps, validate-flutter, validate-docker]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.validate-apps.result }}" == "failure" || \
                "${{ needs.validate-docker.result }}" == "failure" ]]; then
            echo "One or more required checks failed."
            exit 1
          fi
          echo "All checks passed."
